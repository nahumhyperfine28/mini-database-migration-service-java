services:
  mysql:
    image: mysql:8.0
    container_name: mini-migration-mysql
    command:
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog_format=ROW
      - --binlog_row_image=FULL
      - --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-source_db}
      MYSQL_USER: ${MYSQL_USERNAME:-migration_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-migration_password}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/mysql_init.sql:/docker-entrypoint-initdb.d/01_mysql_init.sql:ro
      - ./sql/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres:
    image: postgres:17
    container_name: mini-migration-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE:-target_db}
      POSTGRES_USER: ${POSTGRES_USERNAME:-migration_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-migration_password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql/postgres_init.sql:/docker-entrypoint-initdb.d/01_postgres_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME:-migration_user} -d ${POSTGRES_DATABASE:-target_db}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql-data:
  postgres-data:
